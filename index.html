<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF小冊子作成</title>
    <style>
        :root {
            --bg: #eef2f3;
            --panel: #ffffff;
            --text: #1f2933;
            --subtle: #52606d;
            --line: #d9e2ec;
            --accent: #1565c0;
            --accent-hover: #0d47a1;
            --ok: #1b8a5a;
            --error: #c62828;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(21, 101, 192, 0.12), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
            color: var(--text);
        }

        .wrap {
            width: min(820px, 100%);
            margin: 0 auto;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(21, 101, 192, 0.08);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(28px, 5vw, 38px);
            line-height: 1.1;
        }

        .lead {
            margin: 0 0 24px;
            color: var(--subtle);
            line-height: 1.7;
        }

        .field {
            margin-bottom: 18px;
        }

        .field-title {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        input[type="file"],
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f8fafc;
            font: inherit;
            color: inherit;
        }

        input[type="range"] {
            width: 100%;
        }

        .checklist,
        .options {
            display: grid;
            gap: 12px;
            margin: 20px 0 24px;
        }

        .check-item,
        .option-header {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fbfdff;
        }

        .check-item input,
        .option-header input {
            margin-top: 3px;
        }

        .check-item strong,
        .option-header strong {
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .check-item span,
        .option-header span,
        .option-help {
            display: block;
            color: var(--subtle);
            font-size: 13px;
            line-height: 1.55;
        }

        .section-title {
            margin: 26px 0 10px;
            font-size: 16px;
            font-weight: 700;
        }

        .option-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #fbfdff;
            overflow: hidden;
        }

        .option-settings {
            display: grid;
            gap: 14px;
            padding: 0 16px 16px;
        }

        .option-settings.disabled {
            opacity: 0.45;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .mini-field {
            display: grid;
            gap: 8px;
            font-size: 13px;
            color: var(--subtle);
        }

        .inline-value {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
        }

        button {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, #1976d2 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            box-shadow: 0 16px 28px rgba(21, 101, 192, 0.24);
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            background: linear-gradient(135deg, var(--accent-hover) 0%, var(--accent) 100%);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
            box-shadow: none;
        }

        .status {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px solid var(--line);
            color: var(--subtle);
            line-height: 1.6;
            white-space: pre-line;
        }

        .status.error {
            color: var(--error);
            border-color: rgba(198, 40, 40, 0.28);
            background: rgba(198, 40, 40, 0.05);
        }

        .status.success {
            color: var(--ok);
            border-color: rgba(27, 138, 90, 0.24);
            background: rgba(27, 138, 90, 0.05);
        }

        .downloads {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        .download-link {
            display: block;
            padding: 14px 16px;
            border-radius: 14px;
            background: #f3f8ff;
            border: 1px solid rgba(21, 101, 192, 0.16);
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .notes {
            margin-top: 20px;
            color: var(--subtle);
            font-size: 13px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="panel">
            <h1>PDF小冊子作成</h1>
            <p class="lead">
                小冊子の面付けに加えて、画像圧縮、PDF圧縮、ピクセル変更をそれぞれ別機能として選べます。
                圧縮を使わないときは、元PDFをできるだけそのまま活かして出力します。
            </p>

            <div class="field">
                <label class="field-title" for="pdfUpload">PDFファイル</label>
                <input type="file" id="pdfUpload" accept="application/pdf">
            </div>

            <div class="checklist">
                <label class="check-item">
                    <input type="checkbox" id="mergeBooklets">
                    <div>
                        <strong>おもてと裏を1つに統合</strong>
                        <span>各シートの表裏を交互に並べた1つのPDFを作成します。</span>
                    </div>
                </label>
                <label class="check-item">
                    <input type="checkbox" id="monochrome">
                    <div>
                        <strong>グレースケール化</strong>
                        <span>小冊子化の前に各ページを白黒寄りへ変換します。</span>
                    </div>
                </label>
            </div>

            <div class="section-title">追加機能</div>
            <div class="options">
                <div class="option-card">
                    <label class="option-header">
                        <input type="checkbox" id="imageCompression">
                        <div>
                            <strong>画像圧縮</strong>
                            <span>ページをJPEGとして再画像化し、小冊子化前の画像サイズを軽くします。</span>
                        </div>
                    </label>
                    <div id="imageCompressionSettings" class="option-settings">
                        <label class="mini-field" for="imageQuality">
                            JPEG画質
                            <span id="imageQualityValue" class="inline-value">72%</span>
                            <input type="range" id="imageQuality" min="25" max="95" value="72">
                        </label>
                        <div class="option-help">画像圧縮だけをオンにした場合は、標準の画像サイズでJPEG化します。</div>
                    </div>
                </div>

                <div class="option-card">
                    <label class="option-header">
                        <input type="checkbox" id="resizeImages">
                        <div>
                            <strong>画像のピクセル変更</strong>
                            <span>小冊子化前にページを指定ピクセルへ再サンプリングします。</span>
                        </div>
                    </label>
                    <div id="resizeImageSettings" class="option-settings">
                        <div class="settings-grid">
                            <label class="mini-field" for="sourceMaxWidth">
                                最大幅(px)
                                <input type="number" id="sourceMaxWidth" min="200" step="10" value="1800">
                            </label>
                            <label class="mini-field" for="sourceMaxHeight">
                                最大高さ(px)
                                <input type="number" id="sourceMaxHeight" min="200" step="10" value="1800">
                            </label>
                        </div>
                        <div class="option-help">縦横比は維持されます。小さくすると軽量化しやすくなります。</div>
                    </div>
                </div>

                <div class="option-card">
                    <label class="option-header">
                        <input type="checkbox" id="pdfCompression">
                        <div>
                            <strong>PDF圧縮</strong>
                            <span>完成後のPDF全体を再画像化して、最終ファイルサイズをさらに下げます。</span>
                        </div>
                    </label>
                    <div id="pdfCompressionSettings" class="option-settings">
                        <div class="settings-grid">
                            <label class="mini-field" for="pdfQuality">
                                PDF圧縮のJPEG画質
                                <span id="pdfQualityValue" class="inline-value">68%</span>
                                <input type="range" id="pdfQuality" min="25" max="95" value="68">
                            </label>
                            <label class="mini-field" for="pdfMaxWidth">
                                最終PDF 最大幅(px)
                                <input type="number" id="pdfMaxWidth" min="200" step="10" value="1600">
                            </label>
                            <label class="mini-field" for="pdfMaxHeight">
                                最終PDF 最大高さ(px)
                                <input type="number" id="pdfMaxHeight" min="200" step="10" value="1600">
                            </label>
                        </div>
                        <div class="option-help">PDF圧縮は完成後の表面・裏面・統合PDFに対して個別に適用します。</div>
                    </div>
                </div>
            </div>

            <button id="createButton" type="button">小冊子PDFを作成</button>
            <div id="status" class="status">PDFを選んでから実行してください。</div>
            <div id="downloads" class="downloads"></div>

            <div class="notes">
                元PDFのページ数が4の倍数でない場合は、必要な分だけ空白ページを自動で追加します。
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        const fileInput = document.getElementById("pdfUpload");
        const mergeBookletsInput = document.getElementById("mergeBooklets");
        const monochromeInput = document.getElementById("monochrome");
        const imageCompressionInput = document.getElementById("imageCompression");
        const resizeImagesInput = document.getElementById("resizeImages");
        const pdfCompressionInput = document.getElementById("pdfCompression");

        const imageQualityInput = document.getElementById("imageQuality");
        const imageQualityValue = document.getElementById("imageQualityValue");
        const sourceMaxWidthInput = document.getElementById("sourceMaxWidth");
        const sourceMaxHeightInput = document.getElementById("sourceMaxHeight");
        const pdfQualityInput = document.getElementById("pdfQuality");
        const pdfQualityValue = document.getElementById("pdfQualityValue");
        const pdfMaxWidthInput = document.getElementById("pdfMaxWidth");
        const pdfMaxHeightInput = document.getElementById("pdfMaxHeight");

        const createButton = document.getElementById("createButton");
        const statusBox = document.getElementById("status");
        const downloadsBox = document.getElementById("downloads");
        const activeUrls = [];

        const optionPanels = [
            { checkbox: imageCompressionInput, panel: document.getElementById("imageCompressionSettings") },
            { checkbox: resizeImagesInput, panel: document.getElementById("resizeImageSettings") },
            { checkbox: pdfCompressionInput, panel: document.getElementById("pdfCompressionSettings") }
        ];

        createButton.addEventListener("click", createBooklet);
        imageQualityInput.addEventListener("input", syncRangeLabels);
        pdfQualityInput.addEventListener("input", syncRangeLabels);
        imageCompressionInput.addEventListener("change", syncOptionPanels);
        resizeImagesInput.addEventListener("change", syncOptionPanels);
        pdfCompressionInput.addEventListener("change", syncOptionPanels);

        syncRangeLabels();
        syncOptionPanels();

        function syncRangeLabels() {
            imageQualityValue.textContent = `${imageQualityInput.value}%`;
            pdfQualityValue.textContent = `${pdfQualityInput.value}%`;
        }

        function syncOptionPanels() {
            optionPanels.forEach(({ checkbox, panel }) => {
                const enabled = checkbox.checked;
                panel.classList.toggle("disabled", !enabled);
                panel.querySelectorAll("input").forEach((input) => {
                    input.disabled = !enabled;
                });
            });
        }

        function setStatus(message, tone = "neutral") {
            statusBox.textContent = message;
            statusBox.className = "status";
            if (tone === "error") {
                statusBox.classList.add("error");
            }
            if (tone === "success") {
                statusBox.classList.add("success");
            }
        }

        function clearDownloads() {
            while (activeUrls.length > 0) {
                URL.revokeObjectURL(activeUrls.pop());
            }
            downloadsBox.innerHTML = "";
        }

        function addDownloadLink(url, fileName, label) {
            activeUrls.push(url);
            const link = document.createElement("a");
            link.href = url;
            link.download = fileName;
            link.textContent = label;
            link.className = "download-link";
            downloadsBox.appendChild(link);
        }

        function formatBytes(bytes) {
            if (!Number.isFinite(bytes) || bytes <= 0) {
                return "0 B";
            }

            const units = ["B", "KB", "MB", "GB"];
            let size = bytes;
            let unitIndex = 0;

            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex += 1;
            }

            return `${size.toFixed(size >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
        }

        function getPositiveInt(value, fallback) {
            const parsed = Number.parseInt(value, 10);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
        }

        function buildSpreads(pageCount) {
            const sheetCount = Math.ceil(pageCount / 4);
            const paddedPageCount = sheetCount * 4;
            const spreads = [];

            for (let sheetIndex = 0; sheetIndex < sheetCount; sheetIndex += 1) {
                spreads.push({
                    front: [paddedPageCount - 1 - sheetIndex * 2, sheetIndex * 2],
                    back: [sheetIndex * 2 + 1, paddedPageCount - 2 - sheetIndex * 2]
                });
            }

            return { sheetCount, paddedPageCount, spreads };
        }

        function getCellMetrics(pageSizes) {
            return pageSizes.reduce((metrics, size) => ({
                width: Math.max(metrics.width, size.width),
                height: Math.max(metrics.height, size.height)
            }), { width: 0, height: 0 });
        }

        function getRenderScale(baseViewport, maxWidth, maxHeight, fallbackScale = 1.5) {
            if (!maxWidth && !maxHeight) {
                return fallbackScale;
            }

            const widthScale = maxWidth ? maxWidth / baseViewport.width : Number.POSITIVE_INFINITY;
            const heightScale = maxHeight ? maxHeight / baseViewport.height : Number.POSITIVE_INFINITY;
            const scale = Math.min(widthScale, heightScale);

            if (!Number.isFinite(scale) || scale <= 0) {
                return fallbackScale;
            }

            return Math.max(scale, 0.1);
        }

        async function canvasToBytes(canvas, format, quality) {
            const mimeType = format === "jpeg" ? "image/jpeg" : "image/png";
            const blob = await new Promise((resolve, reject) => {
                canvas.toBlob((createdBlob) => {
                    if (createdBlob) {
                        resolve(createdBlob);
                        return;
                    }
                    reject(new Error("画像データの生成に失敗しました。"));
                }, mimeType, quality);
            });

            return new Uint8Array(await blob.arrayBuffer());
        }

        async function renderPdfPagesAsImages(pdfBytes, pageSizes, options) {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes.slice(0) });
            const pdf = await loadingTask.promise;
            const renderedPages = [];

            for (let pageIndex = 0; pageIndex < pdf.numPages; pageIndex += 1) {
                if (options.statusLabel) {
                    setStatus(`${options.statusLabel}\n${pageIndex + 1} / ${pdf.numPages} ページ`, "neutral");
                }

                const page = await pdf.getPage(pageIndex + 1);
                const baseViewport = page.getViewport({ scale: 1 });
                const renderScale = getRenderScale(
                    baseViewport,
                    options.maxWidth,
                    options.maxHeight,
                    options.defaultScale
                );
                const viewport = page.getViewport({ scale: renderScale });
                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d", { willReadFrequently: options.grayscale });

                if (!context) {
                    throw new Error("Canvasの初期化に失敗しました。");
                }

                canvas.width = Math.max(1, Math.round(viewport.width));
                canvas.height = Math.max(1, Math.round(viewport.height));

                context.fillStyle = "#ffffff";
                context.fillRect(0, 0, canvas.width, canvas.height);

                await page.render({
                    canvasContext: context,
                    viewport
                }).promise;

                if (options.grayscale) {
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const { data } = imageData;

                    for (let i = 0; i < data.length; i += 4) {
                        const gray = Math.round(data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }

                    context.putImageData(imageData, 0, 0);
                }

                const bytes = await canvasToBytes(canvas, options.format, options.quality);
                renderedPages.push({
                    type: "image",
                    format: options.format,
                    width: pageSizes[pageIndex].width,
                    height: pageSizes[pageIndex].height,
                    bytes
                });
            }

            return renderedPages;
        }

        function getSourceTransformOptions() {
            const monochrome = monochromeInput.checked;
            const imageCompression = imageCompressionInput.checked;
            const resizeImages = resizeImagesInput.checked;

            if (!monochrome && !imageCompression && !resizeImages) {
                return { rasterize: false };
            }

            return {
                rasterize: true,
                grayscale: monochrome,
                format: imageCompression ? "jpeg" : "png",
                quality: imageCompression ? Number(imageQualityInput.value) / 100 : 1,
                maxWidth: resizeImages ? getPositiveInt(sourceMaxWidthInput.value, 1800) : 1800,
                maxHeight: resizeImages ? getPositiveInt(sourceMaxHeightInput.value, 1800) : 1800,
                defaultScale: 1.5,
                statusLabel: monochrome || imageCompression || resizeImages
                    ? "小冊子用にページを画像変換しています..."
                    : ""
            };
        }

        function getPdfCompressionOptions() {
            if (!pdfCompressionInput.checked) {
                return { enabled: false };
            }

            return {
                enabled: true,
                format: "jpeg",
                quality: Number(pdfQualityInput.value) / 100,
                maxWidth: getPositiveInt(pdfMaxWidthInput.value, 1600),
                maxHeight: getPositiveInt(pdfMaxHeightInput.value, 1600),
                defaultScale: 1.4
            };
        }

        async function buildPageSources(pdfDoc, pdfBytes, options) {
            const pageSizes = pdfDoc.getPages().map((page) => ({
                width: page.getWidth(),
                height: page.getHeight()
            }));

            if (!options.rasterize) {
                return pdfDoc.getPages().map((page, index) => ({
                    type: "page",
                    width: pageSizes[index].width,
                    height: pageSizes[index].height,
                    sourcePage: page
                }));
            }

            return renderPdfPagesAsImages(pdfBytes, pageSizes, options);
        }

        async function drawPlacedPage(targetDoc, targetPage, source, cellX, cellWidth, cellHeight) {
            const scale = Math.min(cellWidth / source.width, cellHeight / source.height);
            const drawWidth = source.width * scale;
            const drawHeight = source.height * scale;
            const x = cellX + (cellWidth - drawWidth) / 2;
            const y = (cellHeight - drawHeight) / 2;

            if (source.type === "page") {
                const embeddedPage = await targetDoc.embedPage(source.sourcePage);
                targetPage.drawPage(embeddedPage, { x, y, width: drawWidth, height: drawHeight });
                return;
            }

            const embeddedImage = source.format === "jpeg"
                ? await targetDoc.embedJpg(source.bytes)
                : await targetDoc.embedPng(source.bytes);

            targetPage.drawImage(embeddedImage, { x, y, width: drawWidth, height: drawHeight });
        }

        async function addSpreadPage(targetDoc, indices, sources, cellWidth, cellHeight) {
            const page = targetDoc.addPage([cellWidth * 2, cellHeight]);
            const [leftIndex, rightIndex] = indices;
            const placements = [
                { sourceIndex: leftIndex, x: 0 },
                { sourceIndex: rightIndex, x: cellWidth }
            ];

            for (const placement of placements) {
                const source = sources[placement.sourceIndex];
                if (!source) {
                    continue;
                }
                await drawPlacedPage(targetDoc, page, source, placement.x, cellWidth, cellHeight);
            }
        }

        async function compressPdfBytes(pdfBytes, options, label) {
            const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const pageSizes = pdfDoc.getPages().map((page) => ({
                width: page.getWidth(),
                height: page.getHeight()
            }));

            const renderedPages = await renderPdfPagesAsImages(pdfBytes, pageSizes, {
                format: options.format,
                quality: options.quality,
                maxWidth: options.maxWidth,
                maxHeight: options.maxHeight,
                defaultScale: options.defaultScale,
                grayscale: false,
                statusLabel: `${label} を圧縮しています...`
            });

            const compressedDoc = await PDFLib.PDFDocument.create();

            for (let i = 0; i < renderedPages.length; i += 1) {
                const renderedPage = renderedPages[i];
                const page = compressedDoc.addPage([pageSizes[i].width, pageSizes[i].height]);
                const image = await compressedDoc.embedJpg(renderedPage.bytes);
                page.drawImage(image, {
                    x: 0,
                    y: 0,
                    width: pageSizes[i].width,
                    height: pageSizes[i].height
                });
            }

            return new Uint8Array(await compressedDoc.save());
        }

        async function buildOutputBytes(doc, pdfCompressionOptions, label) {
            let bytes = new Uint8Array(await doc.save());

            if (pdfCompressionOptions.enabled) {
                bytes = await compressPdfBytes(bytes, pdfCompressionOptions, label);
            }

            return bytes;
        }

        async function createBooklet() {
            clearDownloads();

            if (fileInput.files.length === 0) {
                setStatus("PDFファイルをアップロードしてください。", "error");
                return;
            }

            createButton.disabled = true;

            try {
                const file = fileInput.files[0];
                const originalFileName = file.name.replace(/\.[^/.]+$/, "");
                const inputBytes = new Uint8Array(await file.arrayBuffer());
                const pdfDoc = await PDFLib.PDFDocument.load(inputBytes);
                const pageCount = pdfDoc.getPageCount();

                if (pageCount === 0) {
                    throw new Error("ページが含まれていないPDFです。");
                }

                const mergeBooklets = mergeBookletsInput.checked;
                const sourceOptions = getSourceTransformOptions();
                const pdfCompressionOptions = getPdfCompressionOptions();
                const { sheetCount, paddedPageCount, spreads } = buildSpreads(pageCount);
                const blankPages = paddedPageCount - pageCount;
                const sources = await buildPageSources(pdfDoc, inputBytes, sourceOptions);
                const { width: cellWidth, height: cellHeight } = getCellMetrics(sources);

                const frontDoc = await PDFLib.PDFDocument.create();
                const backDoc = await PDFLib.PDFDocument.create();
                const mergedDoc = mergeBooklets ? await PDFLib.PDFDocument.create() : null;

                setStatus([
                    "小冊子を作成しています...",
                    `元ページ数: ${pageCount}`,
                    `追加される空白ページ: ${blankPages}`,
                    `シート数: ${sheetCount}`
                ].join("\n"));

                for (let i = 0; i < spreads.length; i += 1) {
                    const spread = spreads[i];

                    setStatus([
                        "小冊子を作成しています...",
                        `シート ${i + 1} / ${spreads.length}`,
                        `元ページ数: ${pageCount}`,
                        `追加される空白ページ: ${blankPages}`
                    ].join("\n"));

                    await addSpreadPage(frontDoc, spread.front, sources, cellWidth, cellHeight);
                    await addSpreadPage(backDoc, spread.back, sources, cellWidth, cellHeight);

                    if (mergedDoc) {
                        await addSpreadPage(mergedDoc, spread.front, sources, cellWidth, cellHeight);
                        await addSpreadPage(mergedDoc, spread.back, sources, cellWidth, cellHeight);
                    }
                }

                if (mergedDoc) {
                    const mergedBytes = await buildOutputBytes(mergedDoc, pdfCompressionOptions, "統合PDF");
                    const mergedUrl = URL.createObjectURL(new Blob([mergedBytes], { type: "application/pdf" }));
                    addDownloadLink(
                        mergedUrl,
                        `${originalFileName}[小冊子統合].pdf`,
                        `統合された小冊子PDFをダウンロード (${formatBytes(mergedBytes.byteLength)})`
                    );
                } else {
                    const frontBytes = await buildOutputBytes(frontDoc, pdfCompressionOptions, "おもてPDF");
                    const backBytes = await buildOutputBytes(backDoc, pdfCompressionOptions, "うらPDF");

                    const frontUrl = URL.createObjectURL(new Blob([frontBytes], { type: "application/pdf" }));
                    const backUrl = URL.createObjectURL(new Blob([backBytes], { type: "application/pdf" }));

                    addDownloadLink(
                        frontUrl,
                        `${originalFileName}[おもて].pdf`,
                        `おもてPDFをダウンロード (${formatBytes(frontBytes.byteLength)})`
                    );
                    addDownloadLink(
                        backUrl,
                        `${originalFileName}[うら].pdf`,
                        `うらPDFをダウンロード (${formatBytes(backBytes.byteLength)})`
                    );
                }

                setStatus([
                    "小冊子PDFの作成が完了しました。",
                    `入力ファイルサイズ: ${formatBytes(inputBytes.byteLength)}`,
                    `元ページ数: ${pageCount}`,
                    `追加した空白ページ: ${blankPages}`,
                    `出力シート数: ${sheetCount}`,
                    imageCompressionInput.checked ? "画像圧縮: 有効" : "画像圧縮: 無効",
                    resizeImagesInput.checked ? "ピクセル変更: 有効" : "ピクセル変更: 無効",
                    pdfCompressionInput.checked ? "PDF圧縮: 有効" : "PDF圧縮: 無効",
                    monochromeInput.checked ? "グレースケール化: 有効" : "グレースケール化: 無効"
                ].join("\n"), "success");
            } catch (error) {
                console.error("エラーが発生しました:", error);
                setStatus(`エラーが発生しました。\n${error.message}`, "error");
            } finally {
                createButton.disabled = false;
            }
        }
    </script>
</body>
</html>
